[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cited-core"
version = "0.3.2"
description = "Core library for the Cited GEO platform"
license = "LicenseRef-Proprietary"
requires-python = ">=3.11"
authors = [{ name = "Cited", email = "support@youcited.com" }]
dependencies = [
    "httpx>=0.27.0",
    "keyring>=25.0.0",
    "tomli-w>=1.0.0",
    "pydantic>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cited_core"]
