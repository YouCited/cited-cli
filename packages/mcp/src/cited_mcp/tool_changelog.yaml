# Tool surface changelog for cited-mcp.
#
# Each entry corresponds to a release. The `fingerprint` field is the value of
# compute_tools_fingerprint(mcp) at that release — pinned so that
# whats_new(since_fingerprint=...) can resolve to a version without needing
# since_version as a fallback.
#
# Entries are listed newest-first. Append new entries to the top.
#
# Fingerprint history starts at 0.3.5 (the release that introduced this file).
# Sessions that stashed a tools_fingerprint from a pre-0.3.5 server will hit
# the "fingerprint not recognized" branch and receive the full changelog with
# a _note. Pre-0.3.5 entries are not backfilled — the fingerprint algorithm
# requires a live tool registry, which we can't reconstruct retroactively.
#
# Adding an entry (release process):
#   1. Add the new top entry with `fingerprint: PENDING`.
#   2. After bumping versions and registering tools, run the helper that prints
#      compute_tools_fingerprint(mcp) and replace `PENDING`.
#   3. CI fails any PR that bumps pyproject.toml `version` without modifying
#      this file.

versions:
  - version: "0.3.14"
    released: "2026-05-05"
    fingerprint: "defa3022aedb"
    tools_added:
      - name: get_recommendation_insight_detail
        description: |
          Drill-down companion to get_recommendation_insights. Given
          (job_id, source_type, source_id) returns the single matching
          insight wrapped as {source_type, source_id, insight}. If the
          source_id doesn't exist, returns a typed
          ``insight_not_found`` error with ``available_source_ids``
          for that category so callers can self-correct. Pairs with
          summary mode on get_recommendation_insights.
    tools_changed:
      - name: get_recommendation_insights
        change_summary: |
          Adds ``full: bool = False`` parameter mirroring
          get_audit_result. Default is now a **summary** projection —
          per-category counts plus light rows
          ({source_type, source_id, label, key_metric}) — instead of
          the full payload. Use ``full=True`` for the previous
          behavior, or get_recommendation_insight_detail to drill
          into a single insight without retrieving everything.
          Reduces context spend on large recommendations.
    tools_removed: []
    behavior_changed: []

  - version: "0.3.12"
    released: "2026-05-04"
    fingerprint: "c706ad655d3c"
    tools_added:
      - name: get_action_plan
        description: |
          Returns the prioritized list of action items for a business —
          ranked by impact and effort, with descriptions, expected
          improvements, and implementation guidance. Wraps
          GET /businesses/{business_id}/hq/priority. Pair with
          get_quick_wins to filter for low-effort/high-impact items, or
          mark_action_done after completing one.
      - name: get_quick_wins
        description: |
          Filtered view of get_action_plan that surfaces low-effort,
          high-impact items first — the changes that deliver the
          fastest results. Ideal entry point for "what should I do
          first" prompts.
      - name: mark_action_done
        description: |
          Mark a priority action as completed. For
          recommendation-sourced actions the Validation Engine
          auto-runs and the response includes a ``validation`` block
          (status / message / validated_at / mode / check_id). Wraps
          PATCH /businesses/{id}/hq/priority/{action_id}/status.
      - name: dismiss_action
        description: |
          Dismiss a priority action without marking it complete (e.g.
          out of scope, won't fix). Wraps the same status-patch
          endpoint as mark_action_done with a different status.
      - name: get_action_progress
        description: |
          Aggregate progress summary across all priority actions —
          counts of done / dismissed / pending, recent completions,
          remaining quick wins. Wraps
          GET /businesses/{business_id}/hq/priority/summary.
    tools_changed: []
    tools_removed: []

  - version: "0.3.11"
    released: "2026-05-04"
    fingerprint: "877b24a01ca7"
    tools_added:
      - name: get_recommendation_check_status
        description: |
          Run all 62 deterministic GEO/SEO checks (Validation Engine)
          against the business linked to a recommendation job. Returns
          counts (valid / invalid / inconclusive) plus per-check detail
          (check_id, category, domain, status, message, template_title,
          template_priority). Modes: ``cache`` (read recent crawl, fast)
          or ``fresh`` (live HTTP fetches, slow but accurate). Wraps
          GET /recommendations/{job_id}/check-status.
      - name: validate_recommendation
        description: |
          Re-run the deterministic check for a single recommendation
          and persist the result. Returns {job_id, recommendation_id,
          check_id, mode}; the worker writes the result asynchronously
          and it can be fetched via get_recommendation_validation_latest.
          Wraps POST /recommendations/{recommendation_id}/validate.
      - name: get_recommendation_validation_latest
        description: |
          Fetch the most recent stored validation result for a
          recommendation. Returns {id, recommendation_id, check_id,
          status (valid|invalid|inconclusive), trigger, evidence,
          fetched_at, created_at}. Wraps
          GET /recommendations/{recommendation_id}/validate/latest.
    tools_changed: []
    tools_removed: []
    behavior_changed:
      - area: validation_engine
        change_summary: |
          Three new MCP tools expose the cited backend's Validation
          Engine (62 deterministic GEO/SEO checks across schema,
          llms.txt, technical SEO, content, and social) so agents can
          verify recommendation completion without re-running a full
          AI-citation audit. All three are gated to the BASE tier
          (consistent with the other recommendation lifecycle tools)
          and require ``settings.validation_engine_enabled=true`` on
          the cited backend; if the feature flag is off the tools
          surface a 503 from the backend.

  - version: "0.3.10"
    released: "2026-05-04"
    # Fingerprint unchanged from 0.3.9 — pure observability addition.
    # No tool surface change, no docstring change, no input-schema change.
    fingerprint: "b22511d8b84d"
    tools_added: []
    tools_changed: []
    tools_removed: []
    behavior_changed:
      - area: oauth_observability
        change_summary: |
          ASGI middleware now emits one structured ``[oauth-event]`` log
          line per request hitting /register, /authorize, /token, /revoke,
          or /oauth/callback. Each line includes event name, HTTP method,
          source IP, user-agent prefix (60 chars), response status, and —
          for /authorize — redirect_uri, scope, response_type, resource,
          and a short client_id prefix. Tokens and full JWTs are not
          logged — only presence flags (e.g. ``has_token=true``).
          Greppable via CloudWatch with filter pattern ``[oauth-event]``.
          Internal observability change only; no client-visible behavior
          difference. Added to count actual OAuth dances vs. background
          protocol probes when triaging "is the connector forcing
          re-auth?" questions.
      - area: tests
        change_summary: |
          packages/mcp/tests/conftest.py adds two autouse fixtures that
          stop ``test_login_returns_url_immediately`` and friends from
          having real side effects on the test runner's machine: the
          fixtures patch ``cited_mcp.tools.auth.webbrowser.open`` and
          replace ``OAuthCallbackServer.{__init__, start, shutdown,
          wait_for_token}`` with deterministic no-op stubs. Without these,
          every pytest invocation that exercised the login tool was
          opening a real browser tab and binding an ephemeral localhost
          socket, then leaving the tab pointing at a dead port when the
          test cleanup ran (visible as repeated Firefox "can't connect to
          localhost:NNNNN" pages on the maintainer's laptop, one per
          pytest run). No production behavior change.

  - version: "0.3.9"
    released: "2026-05-04"
    fingerprint: "b22511d8b84d"
    tools_added: []
    tools_changed: []
    tools_removed: []
    behavior_changed:
      - area: plan_gating
        change_summary: |
          The structured payment_required response from gated tools now
          includes upgrade_direction (always "tier-up" when this fires) and
          current_price_usd alongside the existing upgrade_price_usd, so
          agents present an unambiguous upgrade ask without guessing the
          tier hierarchy. The message text now spells out both prices:
          "requires the Pro plan ($299/mo) — upgrade from your current
          Scale plan ($99/mo)."
      - area: tool_docstrings
        change_summary: |
          Added a one-line monetization hint to all 10 Pro-gated tool
          docstrings (compare_audits, get_analytics_dashboard,
          get_analytics_trends, get_business_facts, get_business_claims,
          get_competitive_comparison, get_semantic_health, buyer_fit_query,
          get_business_hq, get_usage_stats): "On a payment_required: true
          response, surface upgrade_url and required_tier (with
          upgrade_price_usd) to the user before any fallback." Ports the
          cited:explore SKILL.md instruction into the MCP layer so it
          fires in Claude Desktop too (not just Claude Code with the
          skill loaded).

  - version: "0.3.8"
    released: "2026-05-04"
    # Pinned to the latest 0.3.8 fingerprint (after PR #15's "When to call"
    # docstring expansions). Sessions that stashed the initial 0.3.8
    # fingerprint f4e21a60cfa0 (post-PR-#13 / pre-PR-#15) hit the
    # "unrecognized" branch and get the full history — acceptable, since
    # 0.3.8 was a patch-stream and current users are most likely to have
    # the latest fingerprint.
    fingerprint: "4d21585fd905"
    tools_added:
      - name: get_analytics_dashboard
        description: |
          Combined analytics dashboard for a business — kpi_trends,
          question_performance, citation_trends, benchmarks, and
          domain_benchmarks in one payload. Replaces the broken
          get_analytics_summary.
    tools_changed:
      - name: compare_audits
        change_summary: |
          Now requires a baseline_id parameter (positional). The prior
          single-arg shape called a non-existent /comparison endpoint and
          404'd; the tool now points to /analytics/audits/{audit_id}/
          compare/{baseline_id} which is the route the backend actually
          serves. Pair with list_audits to find a prior audit on the same
          template.
      - name: export_audit
        change_summary: |
          Now POSTs to /audit/{job_id}/export/url and returns
          {url, expires_at, expires_in_seconds, filename, object_name}
          with a presigned download URL (1-hour TTL). The prior shape
          (GET on /export/pdf expecting {url}) hit a 405 because the
          backend route is POST-only and streamed application/pdf bytes.
          Optional provider arg (openai|gemini|perplexity) for per-provider
          views.
      - name: buyer_fit_query
        change_summary: |
          Request payload now matches BuyerFitRequest. Param `query`
          renamed to `buyer` (2-200 chars), business_id is effectively
          required (falls back to default), added constraints
          (list[dict]) and limit (1-20, default 5). Old shape sent
          {"query": ...} which the backend silently rejected.
    tools_removed:
      - name: get_analytics_summary

  - version: "0.3.7"
    released: "2026-05-01"
    # Fingerprint unchanged from 0.3.6 — PR #4 doesn't add, remove, or change
    # any registered tool. It only changes dispatch behavior on UNREGISTERED
    # tool names, which the fingerprint correctly does not reflect.
    fingerprint: "06250a093c6f"
    tools_added: []
    tools_changed: []
    tools_removed: []
    behavior_changed:
      - area: tool_dispatch
        change_summary: |
          tools/call for an unregistered tool name now returns a structured
          {error: true, error_type: "tool_unavailable", message, _request_id}
          payload instead of FastMCP's default ToolError("Unknown tool: X").
          The message references whats_new and ping (compare tools_fingerprint)
          so the agent has actionable next steps when its tool list is stale.
          Resource-not-found (audit_id missing, business not found, etc.) is
          unaffected — that still goes through the CitedAPIError path.

  - version: "0.3.6"
    released: "2026-05-01"
    fingerprint: "06250a093c6f"
    tools_added: []
    tools_changed:
      - name: upgrade_plan
        change_summary: |
          Response now includes two always-present fields. `tools_unlocked` is
          a list of {name, description} entries for tools that became
          available at the new tier (empty for already_on_plan and
          checkout_required, populated for immediate-upgrade success).
          `pending_action` is a nullable string telling the agent what to do
          next: null when nothing is pending, a disconnect/reconnect hint for
          immediate upgrades, or a checkout-URL hint for first-time
          subscribers. The server also emits notifications/tools/list_changed
          on successful immediate upgrades; clients that honor it refresh
          their tool surface without a reconnect.
    tools_removed: []

  - version: "0.3.5"
    released: "2026-05-01"
    fingerprint: "30dfe348eb13"
    tools_added:
      - name: whats_new
        description: |
          Diff the current MCP tool surface against a previously-seen
          fingerprint or version. Pair with ping: stash the
          tools_fingerprint at session start, then call whats_new
          (since_fingerprint=<prior>) when ping reports a different
          fingerprint later in the conversation.
    tools_changed: []
    tools_removed: []
