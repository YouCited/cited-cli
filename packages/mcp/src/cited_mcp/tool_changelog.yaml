# Tool surface changelog for cited-mcp.
#
# Each entry corresponds to a release. The `fingerprint` field is the value of
# compute_tools_fingerprint(mcp) at that release — pinned so that
# whats_new(since_fingerprint=...) can resolve to a version without needing
# since_version as a fallback.
#
# Entries are listed newest-first. Append new entries to the top.
#
# Fingerprint history starts at 0.3.5 (the release that introduced this file).
# Sessions that stashed a tools_fingerprint from a pre-0.3.5 server will hit
# the "fingerprint not recognized" branch and receive the full changelog with
# a _note. Pre-0.3.5 entries are not backfilled — the fingerprint algorithm
# requires a live tool registry, which we can't reconstruct retroactively.
#
# Adding an entry (release process):
#   1. Add the new top entry with `fingerprint: PENDING`.
#   2. After bumping versions and registering tools, run the helper that prints
#      compute_tools_fingerprint(mcp) and replace `PENDING`.
#   3. CI fails any PR that bumps pyproject.toml `version` without modifying
#      this file.

versions:
  - version: "0.3.6"
    released: "2026-05-01"
    fingerprint: "06250a093c6f"
    tools_added: []
    tools_changed:
      - name: upgrade_plan
        change_summary: |
          Response now includes two always-present fields. `tools_unlocked` is
          a list of {name, description} entries for tools that became
          available at the new tier (empty for already_on_plan and
          checkout_required, populated for immediate-upgrade success).
          `pending_action` is a nullable string telling the agent what to do
          next: null when nothing is pending, a disconnect/reconnect hint for
          immediate upgrades, or a checkout-URL hint for first-time
          subscribers. The server also emits notifications/tools/list_changed
          on successful immediate upgrades; clients that honor it refresh
          their tool surface without a reconnect.
    tools_removed: []

  - version: "0.3.5"
    released: "2026-05-01"
    fingerprint: "30dfe348eb13"
    tools_added:
      - name: whats_new
        description: |
          Diff the current MCP tool surface against a previously-seen
          fingerprint or version. Pair with ping: stash the
          tools_fingerprint at session start, then call whats_new
          (since_fingerprint=<prior>) when ping reports a different
          fingerprint later in the conversation.
    tools_changed: []
    tools_removed: []
