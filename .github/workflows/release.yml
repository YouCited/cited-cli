name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      # Build and publish in dependency order: core → mcp → cli
      - name: Build and publish cited-core
        run: |
          cd packages/core
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
        env:
          TWINE_NON_INTERACTIVE: "1"

      - name: Build and publish cited-mcp
        run: |
          cd packages/mcp
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
        env:
          TWINE_NON_INTERACTIVE: "1"

      - name: Build cited-cli
        run: python -m build

      - name: Publish cited-cli to PyPI
        run: twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
        env:
          TWINE_NON_INTERACTIVE: "1"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
